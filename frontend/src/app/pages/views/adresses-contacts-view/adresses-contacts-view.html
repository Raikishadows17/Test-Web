<div class="form-section">
  <h3>
    <span class="material-icons">location_on</span>
    DIRECTORIO DE DIRECCIONES
  </h3>

  <div class="direcciones-grid">
    <!-- Tarjetas existentes (dinámicas) -->
    <div class="direccion-card" *ngFor="let dir of formData.direcciones; let i = index">
      <h5>{{ dir.nombre }}</h5>
      <p>{{ dir.direccion }}</p>
      <p><strong>{{ dir.tipo }}</strong></p>
      <p>Contacto: {{ dir.contacto }}</p>
      <p>Email: {{ dir.email }}</p>
      <p>Horario: {{ dir.horario }}</p>
      <div class="card-actions">
        <button class="btn-secondary small" (click)="editarDireccion(i)">Editar</button>
        <button class="btn-danger small" (click)="eliminarDireccion(i)">Eliminar</button>
      </div>
    </div>

    <!-- Botón de agregar (siempre abajo a la izquierda si hay tarjetas) -->
    <button class="btn-primary add-direccion add-transparent-btn" (click)="mostrarFormulario = !mostrarFormulario">
      {{ mostrarFormulario ? 'Cancelar' : '+ Agregar Nueva Dirección / Sucursal' }}
    </button>
  </div>

  <!-- Formulario para nueva dirección (aparece/desaparece) -->
  <div class="nueva-direccion-form" *ngIf="mostrarFormulario">
    <h4>Nueva Dirección / Sucursal</h4>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre de la Sucursal *</label>
        <input type="text" [(ngModel)]="formData.nuevaDireccion.nombre" placeholder="Ej: Sucursal Guadalajara" required>
      </div>

      <div class="form-group full-width">
        <label>Dirección Completa</label>
        <input type="text" [(ngModel)]="formData.nuevaDireccion.direccion"
          placeholder="Av. Ejemplo 123, Col. Centro, CP 44100, Guadalajara, Jal.">
      </div>

      <div class="form-group">
        <label>Tipo</label>
        <select [(ngModel)]="formData.nuevaDireccion.tipo">
          <option value="Fiscal">Fiscal</option>
          <option value="Operativa">Operativa</option>
          <option value="Almacén">Almacén</option>
          <option value="Oficina">Oficina</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label>Contacto</label>
        <input type="text" [(ngModel)]="formData.nuevaDireccion.contacto" placeholder="Nombre del contacto">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.nuevaDireccion.email" placeholder="contacto@sucursal.com">
      </div>

      <div class="form-group">
        <label>Horario</label>
        <input type="text" [(ngModel)]="formData.nuevaDireccion.horario" placeholder="L-V 8:00 - 18:00">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" (click)="mostrarFormulario = false">Cancelar</button>
      <button class="btn-primary" (click)="agregarDireccion()"
        [disabled]="!formData.nuevaDireccion.nombre || !formData.nuevaDireccion.direccion">
        Guardar Sucursal
      </button>
    </div>
  </div>


</div>
