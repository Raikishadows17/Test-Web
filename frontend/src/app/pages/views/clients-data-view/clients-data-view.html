<div class="form-section">
  <h3>
    <span class="material-icons">card_travel</span>
    IDENTIFICACIÓN FISCAL
  </h3>
  <div class="form-grid">
    <div class="form-group">
      <label>RFC *</label>
      <input type="text" [(ngModel)]="formData.rfcCompany" placeholder="Ej: AAA010101AAA" required maxlength="13"
        minlength="13" (input)="formatRfc($event)" (keypress)="onlyRfcChars($event)" pattern="[A-Z0-9]{13}"
        (blur)="validateRfc()">
      <small *ngIf="formData.rfcCompany && formData.rfcCompany.length !== 13" style="color: #ff9800;">
        Deben ser exactamente 13 caracteres (4 letras + 6 números + 3 alfanuméricos)
      </small>
    </div>

    <div class="form-group">
      <label>Razón Social *</label>
      <input type="text" [(ngModel)]="formData.companyName" placeholder="Razón Social" required
        (keypress)="onlyLettersWithSpaces($event)">
    </div>

    <div class="form-group">
      <label>Nombre Comercial (Apodo) *</label>
      <input type="text" [(ngModel)]="formData.nickname" placeholder="Ej: Samsung Lázaro"
        (keypress)="onlyLettersWithSpaces($event)">
    </div>

    <div class="form-group">
      <label>Industria/Sector</label>
      <select [(ngModel)]="formData.industria">
        <option value="">-- Seleccionar --</option>
        <option *ngFor="let i of formData.options.industrias" [value]="i">{{ i }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Estatus</label>
      <select [(ngModel)]="formData.estatus">
        <option value="">-- Seleccionar --</option>
        <option *ngFor="let e of formData.options.estatuses" [value]="e">{{ e }}</option>
      </select>
    </div>
  </div>

  <h3>
    <span class="material-icons">group</span>
    CLASIFICACIÓN COMERCIAL
  </h3>
  <div class="form-grid">
    <div class="form-group checkbox-group">
      <label>Tipo de Cliente</label>
      <div class="checkbox-row">
        <label>
          <input type="checkbox" [(ngModel)]="formData.certificatedCustomer">
          Cliente Certificado
        </label>
        <label>
          <input type="checkbox" [(ngModel)]="formData.contractActual">
          Contrato Actual
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Ejecutivo de Cuenta</label>
      <select [(ngModel)]="formData.ejecutivoCuenta">
        <option value="">-- Seleccionar --</option>
        <option *ngFor="let e of formData.options.ejecutivos" [value]="e">{{ e }}</option>
      </select>
    </div>
  </div>

  <h3>
    <span class="material-icons">attach_money</span>
    CONDICIONES DE CRÉDITO
  </h3>
  <div class="form-grid">
    <div class="form-group">
      <label>Términos de Pago</label>
      <select [(ngModel)]="formData.terminosPago">
        <option value="">-- Seleccionar --</option>
        <option *ngFor="let t of formData.options.terminosPago" [value]="t">{{ t }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Límite de Crédito</label>
      <input type="number" [(ngModel)]="formData.limiteCredito" placeholder="0.00">
    </div>

    <div class="form-group">
      <label>Comentarios</label>
      <textarea [(ngModel)]="formData.comments" rows="3" placeholder="Notas adicionales del cliente"></textarea>
    </div>

    <div class="form-group">
      <label>Constancia Fiscal</label>
      <div class="file-upload-group">
        <input type="file" id="constanciaFiscal" (change)="onConstanciaSelected($event)" accept=".pdf"
          style="display: none;" />
        <label for="constanciaFiscal" class="btn-secondary">
          <span class="material-icons">upload_file</span>
          {{ formData.docs.constanciaFiscal.urlDocumentPath ? 'Cambiar' : 'Subir' }} PDF
        </label>
        <span class="file-name" *ngIf="selectedConstancia">
          {{ selectedConstancia }}
        </span>
        <a *ngIf="formData.docs.constanciaFiscal.urlDocumentPath && !selectedConstancia"
          [href]="getDocUrl(formData.docs.constanciaFiscal.urlDocumentPath)" target="_blank" class="file-link">
          <span class="material-icons">visibility</span> Ver archivo
        </a>
      </div>
    </div>
    
      <div class="form-group">
        <label>CSR</label>
        <div class="file-upload-group">
          <input type="file" id="csrFile" (change)="onCsrSelected($event)" accept=".pdf"
            style="display: none;" />
          <label for="csrFile" class="btn-secondary">
            <span class="material-icons">upload_file</span>
            Subir PDF
          </label>
          <span class="file-name" *ngIf="selectedCsr">
            {{ selectedCsr }}
          </span>
          <a *ngIf="formData.docs.csr.urlDocumentPath && !selectedCsr"
            [href]="getDocUrl(formData.docs.csr.urlDocumentPath)" target="_blank" class="file-link">
            <span class="material-icons">visibility</span> Ver archivo
          </a>
        </div>
      </div>

  </div>
</div>
