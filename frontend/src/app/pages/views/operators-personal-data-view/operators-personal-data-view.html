<section class="form-section">
  <h3>
    <span class="material-icons">person</span>
    DATOS PERSONALES
  </h3>
  <div class="personal-data-layout">
    <div class="profile-photo-column">
      <div class="profile-photo-container">
        <img *ngIf="profilePhotoPreview" [src]="profilePhotoPreview" alt="Foto de perfil" class="profile-photo">
        <img *ngIf="formData.photoPreview" [src]="formData.photoPreview" alt="Foto de perfil" class="profile-photo">
        <div *ngIf="!formData.photoPreview" class="profile-placeholder">
          <span class="material-icons">person</span>
          <p>Sin foto</p>
        </div>
      </div>

      <div class="upload-btn-wrapper">
        <input type="file" id="profilePhoto" accept="image/*" (change)="onProfilePhotoSelected($event)"
          style="display: none;">
        <label for="profilePhoto" class="btn-secondary">
          <span class="material-icons">photo_camera</span>
          Seleccionar Imagen
        </label>
      </div>

      <small class="help-text" *ngIf="profilePhotoFileName">
        {{ profilePhotoFileName }}
      </small>
    </div>

    <div class="form-data-column">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre(s) *</label>
          <input type="text" [(ngModel)]="formData.names" placeholder="Nombre(s)" required
            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" (keypress)="onlyLetters($event)">
        </div>

        <div class="form-group">
          <label>Apellido Paterno *</label>
          <input type="text" [(ngModel)]="formData.middleName" placeholder="Apellido Paterno" required
            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" (keypress)="onlyLetters($event)">
        </div>

        <div class="form-group">
          <label>Apellido Materno</label>
          <input type="text" [(ngModel)]="formData.lastName" placeholder="Apellido Materno"
            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" (keypress)="onlyLetters($event)">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="formData.email" placeholder="correo@ejemplo.com">
        </div>

        <div class="form-group">
          <label>RFC *</label>
          <input type="text" [(ngModel)]="formData.rfc" placeholder="RFC" required>
        </div>

        <div class="form-group">
          <label>CURP</label>
          <input type="text" [(ngModel)]="formData.curp" placeholder="CURP" maxlength="18"
            pattern="[A-Z]{4}[0-9]{6}[HM][A-Z]{5}[0-9A-Z][0-9]" (input)="formatCurp($event)" (blur)="validateCurp()">
          <small *ngIf="curpError" style="color: #ff9800;">
            {{ curpError }}
          </small>
        </div>

        <div class="form-group">
          <label>NSS (IMSS)</label>
          <input type="text" [(ngModel)]="formData.nss" placeholder="NSS" maxlength="11" pattern="[0-9]{11}"
            (keypress)="onlyNumbers($event)">
        </div>

        <div class="form-group">
          <label>Fecha Nacimiento</label>
          <input type="date" [(ngModel)]="formData.birthDate">
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <select [(ngModel)]="formData.gender">
            <option value="">-- Seleccionar --</option>
            <option *ngFor="let s of formData.options.sexes" [value]="s">{{ s }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Estado Civil</label>
          <select [(ngModel)]="formData.maritalStatus">
            <option value="">-- Seleccionar --</option>
            <option *ngFor="let ms of formData.options.maritalStatuses" [value]="ms">{{ ms }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tipo de Sangre</label>
          <select [(ngModel)]="formData.bloodType">
            <option value="">-- Seleccionar --</option>
            <option *ngFor="let tb of formData.options.typeblood" [value]="tb">{{ tb }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nivel de Estudios</label>
          <select [(ngModel)]="formData.educationLevel">
            <option value="">-- Seleccionar --</option>
            <option *ngFor="let es of formData.options.educationLevels" [value]="es">{{ es }}</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="form-section">
  <h3>
    <span class="material-icons">contact_phone</span>
    DATOS COMPLEMENTARIOS
  </h3>

  <div class="form-grid">
    <div class="form-group">
      <label>Teléfono</label>
      <input type="tel" [(ngModel)]="formData.phone" placeholder="55 1234 5678" maxlength="15"
        (keypress)="onlyNumbers($event)">
    </div>

    <div class="form-group">
      <label>Teléfono adicional</label>
      <input type="tel" [(ngModel)]="formData.emergencyPhone" placeholder="55 1234 5678" maxlength="15"
        (keypress)="onlyNumbers($event)">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" [(ngModel)]="formData.address" placeholder="Calle, número, colonia...">
    </div>

    <div class="form-group">
      <label>Código Postal</label>
      <input type="text" [(ngModel)]="formData.zipCode" placeholder="60950" maxlength="5"
        (keypress)="onlyNumbers($event)">
    </div>

    <div class="form-group">
      <label>INE</label>
      <input type="text" [(ngModel)]="formData.ine" placeholder="Número de INE" maxlength="13"
        (keypress)="onlyNumbers($event)">
    </div>
  </div>
</section>
