<section class="form-section">
  <h3>
    <span class="material-icons">check_box</span>
    LICENCIAS Y CERTIFICACIONES
  </h3>

  <div class="form-grid">
    <div class="license-column">
      <h4>Licencia Federal</h4>
      <div class="form-grid">
        <div class="form-group">
          <label>Número</label>
          <input type="text" [(ngModel)]="formData.driveLicense" placeholder="Número"
            maxlength="15" (keypress)="onlyNumbers($event)">
        </div>

        <div class="form-group">
          <label>Vigencia</label>
          <input type="date" [(ngModel)]="formData.driveLicenseDateExp">
        </div>
      </div>

      <div class="form-group">
        <label>Foto de Licencia</label>
        <div class="file-upload-group">
          <input type="file" id="licenseFile" (change)="onLicenseFileSelected($event)"
            accept="image/*,.pdf" style="display:none;">
          <label for="licenseFile" class="btn-secondary">
            <span class="material-icons">upload_file</span>
            Subir Licencia
          </label>
          <span class="file-name" *ngIf="formData.licenseFileName">{{ formData.licenseFileName }}</span>
          <a *ngIf="formData.driveLicenseUrl && !formData.licenseFileName"
            [href]="getImageUrl(formData.driveLicenseUrl)" target="_blank" class="file-link">
            <span class="material-icons">visibility</span> Ver archivo
          </a>
        </div>
      </div>
    </div>

    <div class="license-column">
      <h4>Certificado Médico / Aptitud</h4>
      <div class="form-grid">
        <div class="form-group">
          <label>Folio</label>
          <input type="text" [(ngModel)]="formData.medicalCertificateFolio"
            placeholder="Folio" maxlength="20" (keypress)="onlyNumbers($event)">
        </div>

        <div class="form-group">
          <label>Vencimiento</label>
          <input type="date" [(ngModel)]="formData.medicalCertificateExp">
        </div>
      </div>

      <div class="form-group">
        <label>Certificado Foráneo</label>
        <div class="file-upload-group">
          <input type="file" id="foreignCertFile" (change)="onForeignCertFileSelected($event)"
            accept=".pdf" style="display:none;">
          <label for="foreignCertFile" class="btn-secondary">
            <span class="material-icons">upload_file</span>
            Subir Certificado Foráneo
          </label>
          <span class="file-name" *ngIf="formData.foreignCertFileName">{{ formData.foreignCertFileName }}</span>
          <a *ngIf="formData.foreignCertificateUrl && !formData.foreignCertFileName"
            [href]="getImageUrl(formData.foreignCertificateUrl)" target="_blank" class="file-link">
            <span class="material-icons">visibility</span> Ver archivo
          </a>
        </div>
      </div>

      <div class="checkbox-row">
        <label>
          <input type="checkbox" [(ngModel)]="formData.certificatedForeignDriver">
          Conductor Certificado en el Extranjero
        </label>
      </div>
    </div>
  </div>
</section>
